<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0d1a0a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="icon.png">
  <title>Tractor Tycoon</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#0d1a0a;overflow:hidden;font-family:'Segoe UI',sans-serif}
    canvas{display:block}

    /* ── HUD ── */
    #hud{
      position:fixed;top:16px;left:50%;transform:translateX(-50%);
      background:rgba(0,0,0,.65);backdrop-filter:blur(8px);
      border:1px solid rgba(255,255,255,.15);border-radius:28px;
      padding:8px 28px;color:#fff;font-size:1.5rem;font-weight:800;
      display:flex;align-items:center;gap:10px;
      user-select:none;pointer-events:none;z-index:10
    }
    #hud .lbl{font-size:1rem;opacity:.7;font-weight:500}

    /* ── Кнопки правый верхний угол ── */
    .corner-btn{
      position:fixed;right:24px;
      width:52px;height:52px;
      backdrop-filter:blur(10px);
      border-radius:50%;
      display:flex;align-items:center;justify-content:center;
      cursor:pointer;z-index:20;
      transition:all .2s;
    }
    #shop-btn{
      top:16px;
      background:rgba(30,90,15,.85);
      border:1px solid rgba(100,220,60,.35);
      color:#c8ff80;font-size:1.55rem;
      box-shadow:0 4px 24px rgba(80,200,40,.18);
    }
    #shop-btn:hover{background:rgba(40,120,20,.9);transform:translateY(2px) scale(1.08);
      box-shadow:0 8px 30px rgba(80,200,40,.35)}
    #map-btn{
      top:76px;
      background:rgba(15,50,90,.85);
      border:1px solid rgba(60,160,255,.35);
      color:#80c8ff;font-size:1.45rem;
      box-shadow:0 4px 24px rgba(40,120,255,.18);
    }
    #map-btn:hover{background:rgba(20,70,130,.9);transform:translateY(2px) scale(1.08);
      box-shadow:0 8px 30px rgba(40,120,255,.35)}
    #rest-btn{
      top:136px;
      background:rgba(40,20,80,.85);
      border:1px solid rgba(160,100,255,.35);
      color:#d0a0ff;font-size:1.45rem;
      box-shadow:0 4px 24px rgba(120,60,255,.18);
    }
    #rest-btn:hover:not(:disabled){background:rgba(60,30,120,.9);transform:translateY(2px) scale(1.08);
      box-shadow:0 8px 30px rgba(120,60,255,.35)}
    #rest-btn:disabled{opacity:.4;cursor:not-allowed}
    #newgame-btn{
      top:196px;
      background:rgba(80,20,20,.85);
      border:1px solid rgba(255,80,80,.3);
      color:#ff9090;font-size:1.3rem;
      box-shadow:0 4px 24px rgba(255,60,60,.15);
    }
    #newgame-btn:hover{background:rgba(120,30,30,.9);transform:translateY(2px) scale(1.08);
      box-shadow:0 8px 30px rgba(255,60,60,.3)}
    #settings-btn{
      position:fixed;top:16px;left:16px;
      width:52px;height:52px;backdrop-filter:blur(10px);
      border-radius:50%;display:flex;align-items:center;justify-content:center;
      cursor:pointer;z-index:20;transition:all .2s;
      background:rgba(60,60,60,.85);border:1px solid rgba(150,150,150,.35);
      color:#fff;font-size:1.55rem;box-shadow:0 4px 24px rgba(0,0,0,.18);
    }
    #settings-btn:hover{background:rgba(90,90,90,.9);transform:translateY(2px) scale(1.08);
      box-shadow:0 8px 30px rgba(0,0,0,.35)}

    /* ── Настройки ── */
    #settings-modal {
      position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0.9);
      width:320px;background:rgba(15,20,15,.95);backdrop-filter:blur(10px);
      border:2px solid rgba(150,150,150,.3);border-radius:12px;
      padding:20px;z-index:150;display:none;opacity:0;transition:all .3s;
      color:#fff;box-shadow:0 10px 40px rgba(0,0,0,.8);font-family:'Segoe UI',sans-serif;
    }
    #settings-modal.open { display:block; opacity:1; transform:translate(-50%,-50%) scale(1); }
    .settings-row { margin-bottom: 16px; }
    .settings-row label { display:block; margin-bottom:6px; font-weight:bold; }
    .settings-row input[type="range"] { width: 100%; }
    .settings-row-flex { display:flex; justify-content:space-between; align-items:center; }

    /* ── Надпись дня ── */
    #day-label{
      position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
      font-size:3.5rem;font-weight:900;color:#fff;letter-spacing:.05em;
      text-shadow:0 0 40px rgba(255,210,80,.9),0 2px 12px rgba(0,0,0,.9);
      pointer-events:none;opacity:0;transition:opacity .6s;
      z-index:100;font-family:'Segoe UI',sans-serif;
    }
    #day-label.visible{opacity:1}

    /* ── Шкала Выносливости ── */
    #stamina-wrap {
      position:fixed;bottom:16px;left:50%;transform:translateX(-50%);
      width:260px;height:24px;background:rgba(0,0,0,0.7);
      border:2px solid rgba(255,255,255,0.2);border-radius:12px;
      overflow:hidden;z-index:20;display:flex;align-items:center;
    }
    #stamina-fill {
      height:100%;background:#33ff33;width:100%;
      transition:background-color 0.3s;
    }
    #stamina-text {
      position:absolute;width:100%;text-align:center;
      color:#fff;font-weight:bold;font-size:0.85rem;
      text-shadow:1px 1px 2px #000;pointer-events:none;
    }
    @keyframes flash-red {
      0% { box-shadow: 0 0 10px #ff3333, inset 0 0 10px #ff3333; }
      50% { box-shadow: 0 0 20px #ff3333, inset 0 0 20px #ff3333; }
      100% { box-shadow: 0 0 10px #ff3333, inset 0 0 10px #ff3333; }
    }
    #stamina-wrap.flashing { animation: flash-red 1s infinite; border-color: #ff3333; }

    /* ── Мини-карта ── */
    #minimap-wrap{
      position:fixed;right:90px;top:16px;
      background:rgba(5,12,4,.88);backdrop-filter:blur(12px);
      border:1px solid rgba(60,160,80,.3);border-radius:16px;
      padding:14px;z-index:25;
      display:none;flex-direction:column;gap:8px;
      box-shadow:0 8px 40px rgba(0,0,0,.5);
    }
    #minimap-wrap.open{display:flex}
    #minimap-wrap h3{
      color:rgba(255,255,255,.55);font-size:.72rem;font-weight:600;
      letter-spacing:.06em;text-transform:uppercase;text-align:center;
    }
    #minimap{border-radius:6px;image-rendering:pixelated}

    /* ── Джойстик ── */
    #joystick-zone {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      z-index: 5; touch-action: none;
    }
    #joystick-base {
      position: absolute; width: 100px; height: 100px;
      background: rgba(255, 255, 255, 0.15); border: 2px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%; pointer-events: none;
      display: none; transform: translate(-50%, -50%);
    }
    #joystick-knob {
      position: absolute; width: 40px; height: 40px;
      background: rgba(255, 255, 255, 0.6); border-radius: 50%;
      top: 50%; left: 50%; transform: translate(-50%, -50%); pointer-events: none;
    }

    /* ── Панель прокачки ── */
    #shop{
      position:fixed;right:0;top:0;bottom:0;width:360px;
      background:rgba(8,18,6,.92);backdrop-filter:blur(20px);
      border-left:1px solid rgba(100,220,60,.2);
      z-index:30;display:flex;flex-direction:column;
      transform:translateX(100%);transition:transform .35s cubic-bezier(.4,0,.2,1);
    }
    #shop.open{transform:translateX(0)}

    .shop-header{
      display:flex;align-items:center;justify-content:space-between;
      padding:22px 24px 18px;border-bottom:1px solid rgba(255,255,255,.07);
    }
    .shop-header h2{color:#c8ff80;font-size:1.25rem;font-weight:800;letter-spacing:.04em}
    .shop-header .balance{
      display:flex;align-items:center;gap:6px;
      background:rgba(255,255,255,.07);border-radius:12px;
      padding:5px 12px;color:#f0e060;font-weight:700;font-size:.95rem;
    }
    .shop-close{
      background:rgba(255,255,255,.08);border:none;border-radius:10px;
      color:#888;font-size:1.1rem;cursor:pointer;padding:6px 10px;
      transition:all .15s;margin-left:12px;
    }
    .shop-close:hover{background:rgba(255,80,80,.2);color:#f88}

    /* ── Карточки улучшений ── */
    .shop-list{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px}
    .shop-list::-webkit-scrollbar{width:4px}
    .shop-list::-webkit-scrollbar-thumb{background:rgba(100,220,60,.3);border-radius:2px}

    .upg-card{
      background:rgba(255,255,255,.04);
      border:1px solid rgba(255,255,255,.08);
      border-radius:16px;padding:16px;
      display:flex;flex-direction:column;gap:12px;
      transition:border-color .2s, background .2s;
    }
    .upg-card.affordable{border-color:rgba(100,220,60,.3);background:rgba(100,220,60,.05)}
    .upg-card.maxed{border-color:rgba(255,215,0,.25);background:rgba(255,215,0,.05)}

    .upg-top{display:flex;align-items:center;gap:12px}
    .upg-icon{
      width:44px;height:44px;border-radius:12px;
      display:flex;align-items:center;justify-content:center;
      font-size:1.4rem;flex-shrink:0;
    }
    .upg-info{flex:1}
    .upg-name{color:#e8f8e0;font-weight:700;font-size:.95rem;margin-bottom:3px}
    .upg-desc{color:rgba(255,255,255,.45);font-size:.78rem}

    /* Уровень — точки */
    .upg-dots{display:flex;gap:5px;align-items:center}
    .dot{
      width:10px;height:10px;border-radius:50%;
      border:1.5px solid rgba(255,255,255,.2);
      transition:all .2s;
    }
    .dot.filled{background:#6ab82a;border-color:#6ab82a;box-shadow:0 0 6px #6ab82a80}
    .dot.filled.gold{background:#f0c030;border-color:#f0c030;box-shadow:0 0 6px #f0c03080}

    /* Кнопка купить */
    .upg-footer{display:flex;align-items:center;justify-content:space-between}
    .upg-stat{color:rgba(255,255,255,.5);font-size:.78rem}
    .upg-stat span{color:#a0e060;font-weight:700}

    .buy-btn{
      background:rgba(80,180,30,.2);
      border:1px solid rgba(80,180,30,.4);
      color:#a0e060;border-radius:12px;
      padding:7px 16px;cursor:pointer;
      font-size:.85rem;font-weight:700;
      display:flex;align-items:center;gap:6px;
      transition:all .2s;white-space:nowrap;
    }
    .buy-btn:hover:not(:disabled){background:#5ab020;border-color:#7ae030;
      box-shadow:0 4px 12px rgba(100,220,40,.25);transform:translateY(-1px)}
    .buy-btn:disabled{background:rgba(255,255,255,.05);border-color:rgba(255,255,255,.1);
      color:rgba(255,255,255,.3);cursor:not-allowed}
    .buy-btn.maxed-btn{background:rgba(255,215,0,.15);border-color:rgba(255,215,0,.3);
      color:#f0c030}

    /* ── Панель Разработчика ── */
    #dev-panel{
      position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);
      background:rgba(20,10,30,.95);backdrop-filter:blur(15px);
      border:2px solid #a060ff;border-radius:16px;padding:24px;
      z-index:100;color:#fff;display:none;flex-direction:column;gap:16px;
      box-shadow:0 0 40px rgba(160,96,255,.4);min-width:320px;
      max-height:85vh;overflow-y:auto;overflow-x:hidden;
    }
    #dev-panel.open{display:flex}
    #dev-panel h2{color:#d0a0ff;text-align:center;margin-bottom:8px;font-size:1.4rem}
    .dev-row{display:flex;justify-content:space-between;align-items:center;gap:16px}
    .dev-slider{flex:1;cursor:pointer}
    .dev-btn{
      background:#a060ff40;border:1px solid #a060ff;color:#e0c0ff;
      padding:8px 16px;border-radius:8px;cursor:pointer;font-weight:bold;
      transition:all .2s;text-align:center;
    }
    .dev-btn:hover{background:#a060ff80;box-shadow:0 0 12px #a060ff80}
    .dev-close{position:absolute;top:12px;right:16px;background:none;border:none;color:#aaa;font-size:1.2rem;cursor:pointer}
    .dev-close:hover{color:#fff}

    /* ── Мобильная адаптация ── */
    @media (max-width: 600px) {
      #shop {
        width: 100%;
        border-left: none;
      }
      #minimap-wrap {
        right: 16px;
        top: 136px; /* Под кнопками магазина и карты */
        padding: 10px;
      }
      #minimap {
        width: 130px;
        height: 130px;
      }
      .shop-item {
        padding: 10px;
      }
    }
    #quests-btn{
      top:196px;
      background:rgba(200,100,0,.85);
      border:2px solid #ff9900;
      box-shadow:0 4px 24px rgba(255,150,0,.18);
    }
    #quests-btn:hover:not(:disabled){background:rgba(230,120,0,.9);transform:translateY(2px) scale(1.08);
      box-shadow:0 8px 30px rgba(255,150,0,.35)}
    #quests-modal { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:rgba(20,30,20,.95); backdrop-filter:blur(10px); border:1px solid rgba(255,255,255,.1); border-radius:16px; padding:24px; color:#fff; display:none; flex-direction:column; gap:16px; min-width:400px; max-width:90%; z-index:100; box-shadow:0 20px 40px rgba(0,0,0,.8); }
    #quests-modal.open { display:flex; }
    .quest-card { background:rgba(0,0,0,.4); border:1px solid rgba(255,255,255,.05); border-radius:12px; padding:16px; display:flex; flex-direction:column; gap:8px; }
    .quest-title { font-size:1.4rem; font-weight:800; color:#ffcc00; }
    .quest-desc { font-size:1rem; color:#aaa; line-height:1.4; }
    .quest-reward { font-size:1rem; color:#00ffcc; font-weight:bold; }
    .quest-cost { font-size:1.2rem; font-weight:bold; color:#ffdd55; display:flex; align-items:center; gap:6px; }
    .quest-btn { background:#00cc66; color:#fff; border:none; border-radius:8px; padding:10px; font-size:1.1rem; font-weight:bold; cursor:pointer; margin-top:8px; transition:0.2s; }
    .quest-btn:hover { background:#00ff80; }
    .quest-btn:disabled { background:#555; color:#888; cursor:not-allowed; }
  </style>
  <script src="yandex-sdk.js"></script>
</head>
<body>
<canvas id="c"></canvas>

<!-- ── Джойстик ── -->
<div id="joystick-zone">
  <div id="joystick-base">
    <div id="joystick-knob"></div>
  </div>
</div>

<div id="hud" style="flex-direction: column; gap: 0;">
  <div style="display:flex; align-items:center; gap:8px;">🌾 <span id="sc">0</span><span class="lbl" id="lbl-hay">сена</span></div>
  <div id="mps-display" style="font-size: 1.1rem; color: #a0e060; display: none; font-weight: bold; margin-top: -2px;">+0 🌾/сек</div>
</div>
<div id="day-label"></div>
<button id="shop-btn" class="corner-btn" onclick="toggleShop()" title="Прокачка">🛒</button>
<button id="map-btn" class="corner-btn" onclick="toggleMap()" title="Карта">🗺️</button>
<button id="quests-btn" class="corner-btn" onclick="toggleQuests()" title="Доска Заказов">📜</button>

<div id="quests-modal">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
    <h2 style="margin:0;font-size:1.8rem;">📜 Доска Заказов</h2>
    <button onclick="toggleQuests()" style="background:none;border:none;color:#fff;font-size:1.5rem;cursor:pointer;">✕</button>
  </div>
  <div id="quests-content"></div>
</div>

<button id="rest-btn" class="corner-btn" onclick="startNight()" title="Отдыхать">🌙</button>
<button id="settings-btn" onclick="toggleSettings()" title="Настройки">⚙️</button>

<div id="settings-modal">
  <h2 id="settings-title" style="margin-top:0;text-align:center;margin-bottom:20px;">⚙️ Настройки</h2>
  <div class="settings-row">
    <label id="lbl-music-vol">Музыка</label>
    <input type="range" id="ui-vol-music" min="0" max="1" step="0.05" value="0.5" oninput="updateVolumesUI()">
  </div>
  <div class="settings-row">
    <label id="lbl-sfx-vol">Звуки</label>
    <input type="range" id="ui-vol-sfx" min="0" max="1" step="0.05" value="0.2" oninput="updateVolumesUI()">
  </div>
  <div class="settings-row settings-row-flex">
    <label id="lbl-vibration" style="margin:0;">Вибрация</label>
    <input type="checkbox" id="ui-vibration" style="transform:scale(1.5);" onchange="toggleVibration()">
  </div>
  <div class="settings-row settings-row-flex">
    <label id="lbl-lang" style="margin:0;">Язык / Language</label>
    <button id="ui-lang-btn" onclick="toggleLanguage()" style="padding:4px 12px;background:rgba(80,160,255,0.2);border:1px solid rgba(80,160,255,0.5);color:#fff;border-radius:6px;cursor:pointer;font-weight:bold;">RU / EN</button>
  </div>
  <button onclick="toggleDevPanel()" style="width:100%;padding:10px;margin-top:10px;background:rgba(160,96,255,0.2);border:1px solid rgba(160,96,255,0.5);color:#d0a0ff;border-radius:6px;cursor:pointer;font-weight:bold;">🛠️ Dev Panel</button>
  <button id="close-settings-btn" onclick="toggleSettings()" style="width:100%;padding:10px;margin-top:10px;background:rgba(80,160,255,0.2);border:1px solid rgba(80,160,255,0.5);color:#fff;border-radius:6px;cursor:pointer;font-weight:bold;">Закрыть</button>
</div>

<!-- ── Секретная Панель Разработчика ── -->
<div id="dev-panel">
  <button class="dev-close" onclick="toggleDevPanel()">✕</button>
  <h2>🛠 Dev Panel</h2>
  
  <div class="dev-row">
    <label>Музыка</label>
    <input type="range" id="vol-music" class="dev-slider" min="0" max="1" step="0.05" value="0.3" oninput="updateVolumes()">
  </div>
  <div class="dev-row">
    <label>Звуки (SFX)</label>
    <input type="range" id="vol-sfx" class="dev-slider" min="0" max="1" step="0.05" value="0.5" oninput="updateVolumes()">
  </div>
  <div class="dev-row">
    <label>Хитбоксы</label>
    <input type="checkbox" id="show-hitbox" onchange="toggleHitbox()" style="transform:scale(1.5);">
  </div>
  <div class="dev-row">
    <label>Радиус трактора</label>
    <input type="range" id="hitbox-radius" class="dev-slider" min="5" max="30" step="1" value="14" oninput="updateHitboxes()">
  </div>
  <div class="dev-row">
    <label>Ковш (Чит-Ширина)</label>
    <input type="range" id="cutter-width" class="dev-slider" min="-20" max="200" step="2" value="0" oninput="updateHitboxes()">
  </div>
  <div class="dev-row">
    <label>Множитель цен в магазине</label>
    <input type="range" id="price-mult" class="dev-slider" min="0" max="10" step="0.1" value="1" oninput="window.devPriceMult=parseFloat(this.value);if(shopOpen)renderShop();">
  </div>
  
  <hr style="border:1px solid #ffffff15;margin:8px 0">
  
  <div style="display:flex;gap:8px">
    <div class="dev-btn" style="flex:1" onclick="devAddHay()">+ 10,000 🌾</div>
    <div class="dev-btn" style="flex:1; background:#cc5500" onclick="score+=1000000;scEl.textContent=score;if(typeof saveProgress === 'function')saveProgress(score,upgLvl,currentDay);">+ 1,000,000 🌾</div>
  </div>
  <div style="display:flex;gap:8px">
    <div class="dev-btn" style="flex:1" onclick="devMaxUpgrade('speed')">Max ⚡</div>
    <div class="dev-btn" style="flex:1" onclick="devMaxUpgrade('width')">Max ⚙️</div>
  </div>
  <div style="display:flex;gap:8px">
    <div class="dev-btn" style="flex:1" onclick="devMaxUpgrade('stamina')">Max 🔋</div>
    <div class="dev-btn" style="flex:1" onclick="devMaxUpgrade('bonus')">Max 🏚️</div>
  </div>
  <div class="dev-btn" style="background:rgba(180,40,40,0.8);margin-top:8px" onclick="newGame()">СБРОС ИГРЫ</div>

  <hr style="border:1px solid #ffffff15;margin:8px 0">
  <h3 style="text-align:center;color:#d0a0ff;margin:5px 0;">Текстуры (Моды)</h3>
  <p style="font-size:12px;margin:5px 0;text-align:center;color:#aaa;">Загрузите свою картинку!</p>
  <select id="tex-type" style="width:100%;margin-bottom:10px;padding:5px;background:#333;color:#fff;border:1px solid #a060ff;">
    <option value="dirt">Земля (подложка)</option>
    <option value="hay">Сено</option>
    <option value="corn">Кукуруза</option>
    <option value="sun">Подсолнух</option>
    <option value="forest">Лес (Деревья)</option>
    <option value="tractor">Трактор</option>
  </select>
  <input type="file" id="tex-upload" accept="image/*" style="width:100%;margin-bottom:10px;"/>
  <button onclick="clearCustomTextures()" class="dev-btn" style="background:#8b2b2b;border-color:#ff5050;color:#ffc0c0;width:100%;">Сбросить все моды</button>
</div>

<!-- ── Шкала Выносливости ── -->
<div id="stamina-wrap">
  <div id="stamina-fill"></div>
  <div id="stamina-text">100%</div>
</div>

<!-- ── Мини-карта ── -->
<div id="minimap-wrap">

// ── АУДИО ДВИЖОК (8-bit Web Audio API) ───────────────────────
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
let audioMuted = false;
let musicVol = 0.5;
let sfxVol = 0.2;

// Узлы громкости
const masterGain = audioCtx.createGain();
const musicGain = audioCtx.createGain();
const sfxGain = audioCtx.createGain();

musicGain.connect(masterGain);
sfxGain.connect(masterGain);
masterGain.connect(audioCtx.destination);
masterGain.gain.value = 1; // Звук включен по умолчанию

// Автоматический запуск звука по первому клику (требование браузеров)
const startAudioOnInteract = () => {
  if (!audioMuted) initAudio();
  window.removeEventListener('click', startAudioOnInteract);
  window.removeEventListener('keydown', startAudioOnInteract);
};
window.addEventListener('click', startAudioOnInteract);
window.addEventListener('keydown', startAudioOnInteract);



function initAudio() {
  if (audioCtx.state === 'suspended') audioCtx.resume();
  if (!window.musicStarted) {
    window.musicStarted = true;
    playMusicSequence();
  }
}

function toggleAudio() {
  audioMuted = !audioMuted;
  masterGain.gain.value = audioMuted ? 0 : 1;
  const btn = document.getElementById('audio-btn');
  btn.textContent = audioMuted ? '🔇' : '🎵';
  btn.classList.toggle('muted', audioMuted);
  if (!audioMuted) initAudio();
}

function toggleVibration() {

  if (vibrationEnabled) vibrate(50);
}

function vibrate(ms) {
  if (vibrationEnabled && navigator.vibrate) {
    navigator.vibrate(ms);
  }
}

function playTone(freq, type, duration, volScale = 1) {
  if (audioMuted) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
  
  gain.gain.setValueAtTime(volScale, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
  
  osc.connect(gain);
  gain.connect(sfxGain);
  osc.start();
  osc.stop(audioCtx.currentTime + duration);
}

function playClick() { playTone(400, 'triangle', 0.05, 0.2); vibrate(15); }
function playCut() { playTone(120, 'triangle', 0.08, 0.015); vibrate(3); }

// Более длинная и разнообразная кантри-мелодия
const melody = [

  {f: 261.63, d: 0.4}, {f: 196.00, d: 0.4}, {f: 261.63, d: 1.2},
  {f: 0, d: 1.2}
];
let noteIdx = 0;

function playMusicSequence() {
  if (melody[noteIdx].f > 0) {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'triangle'; // Мягкий звук
    osc.frequency.value = melody[noteIdx].f;
    gain.gain.setValueAtTime(0.12, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + melody[noteIdx].d);
    osc.connect(gain);
    gain.connect(musicGain);
    osc.start();
    osc.stop(audioCtx.currentTime + melody[noteIdx].d);
  }
  setTimeout(playMusicSequence, melody[noteIdx].d * 1000);
  noteIdx = (noteIdx + 1) % melody.length;
}

    if (typeof shopOpen !== 'undefined' && shopOpen) toggleShop();
    if (typeof mapOpen !== 'undefined' && mapOpen) toggleMap();

    renderQuests();
  }

function renderQuests() {
  const container = document.getElementById('quests-content');
  const qId = upgLvl.quest || 0;
  
  document.querySelector('#quests-modal h2').textContent = t('questsTitle');
  
  if (qId >= QUESTS.length) {
    container.innerHTML = `<div class="quest-card"><div class="quest-title" style="text-align:center;">${t('questCompletedTitle')}</div><div class="quest-desc" style="text-align:center;">${t('questCompletedDesc')}</div></div>`;
    return;
  }
  
  const q = QUESTS[qId];
  const qText = t('quests')[qId];
  const canAfford = score >= q.cost;
  
  container.innerHTML = `
    <div class="quest-card">
      <div class="quest-title">${qText.title}</div>
      <div class="quest-desc">${qText.desc}</div>
      <div class="quest-reward">${qText.reward}</div>
      <div class="quest-cost">🌾 ${q.cost} ${t('questCostStr')}</div>
      <button class="quest-btn" ${!canAfford ? 'disabled' : ''} onclick="completeQuest()">${canAfford ? t('questBtnDo') : t('questBtnNoMoney')}</button>
    </div>
  `;
}

function completeQuest() {
  const qId = upgLvl.quest || 0;
  if (qId >= QUESTS.length) return;
  const q = QUESTS[qId];
  if (score >= q.cost) {
    score -= q.cost;
    upgLvl.quest = qId + 1;
    if (typeof saveProgress === 'function') saveProgress(score, upgLvl, currentDay);
    
    // Spawn float text at player
    floatTexts.push({ x: px, y: py, text: t('questPopupMsg'), life: 2.0 });
    
    scEl.textContent = score;
    renderQuests();
  }
}

function renderShop() {
  const list = document.getElementById('shop-list');
  document.getElementById('bal').textContent = score;
  list.innerHTML = '';

  UPGRADES.forEach(upg => {
    const lvl = upgLvl[upg.id];
    const maxed = lvl >= upg.maxLevel;
    const baseCost = maxed ? null : upg.cost[lvl];
    const cost = maxed ? null : Math.floor(baseCost * (window.devPriceMult !== undefined ? window.devPriceMult : 1.0));
    const canBuy = !maxed && score >= cost;

    const card = document.createElement('div');
    card.className = 'upg-card' + (maxed ? ' maxed' : canBuy ? ' affordable' : '');

    // Точки уровня
    const dots = Array.from({length: upg.maxLevel}, (_, i) =>
      `<div class="dot${i < lvl ? (maxed ? ' filled gold' : ' filled') : ''}"></div>`
    ).join('');

    card.innerHTML = `
      <div class="upg-top">
        <div class="upg-icon" style="background:${upg.iconBg}">${upg.icon}</div>
        <div class="upg-info">
          <div class="upg-name">${t('upgrades', upg.id).name}</div>
          <div class="upg-desc">${t('upgrades', upg.id).desc}</div>
        </div>
      </div>
      <div class="upg-dots">${dots}
        <span style="margin-left:6px;color:rgba(255,255,255,.3);font-size:.75rem">
          ${maxed ? `<span style="color:#f0c030">${t('maxLabel')}</span>` : `${lvl} / ${upg.maxLevel}`}
        </span>
      </div>
      <div class="upg-footer">
        <div class="upg-stat">${t(upg.statKey)}: <span>${upg.statFn(lvl)}</span></div>
        ${maxed
          ? `<button class="buy-btn maxed-btn" disabled>✓ ${t('maxLabel')}</button>`
          : `<button class="buy-btn" ${canBuy?'':'disabled'} onclick="buy('${upg.id}')">
               🌾 ${cost} <span style="font-size:.7rem;opacity:.6">${t('buyHay')}</span>
             </button>`
        }
      </div>
    `;
    list.appendChild(card);
  });
}

function buy(id) {
  playClick();
  const upg = UPGRADES.find(u => u.id === id);
  const lvl = upgLvl[id];
  if (lvl >= upg.maxLevel) return;
  const cost = upg.cost[lvl];
  if (score < cost) return;
  score -= cost;
  upgLvl[id]++;
  if (id === 'stamina') updateMaxStamina();
  
  if (id === 'stamina') updateMaxStamina();

  scEl.textContent = score;
  if (typeof saveProgress === 'function') saveProgress(score, upgLvl);
  renderShop();
}

function initGrid() {
  const cx = MW/2;
  const cy = MH/2;
  const landLvl = Number(upgLvl.land) || 0;
  
  // Размер квадратной плантации увеличивается с уровнем land
  // lvl 0: 50x50 (halfSize = 25)
  // lvl 1: 80x80 (halfSize = 40)
  // lvl 2: 110x110 (halfSize = 55)
  const halfSize = 25 + landLvl * 15;

  for(let y=0; y<MH; y++){
    for(let x=0; x<MW; x++){
      const i = y*MW + x;
      if(x<BRD || x>=MW-BRD || y<BRD || y>=MH-BRD){
        gState[i] = F;
      } else {
        const dx = Math.abs(x - cx);
        const dy = Math.abs(y - cy);
        
        if(dx > halfSize || dy > halfSize) {
          gState[i] = F; // Лес (забор) за пределами квадратной плантации
        } else {
          // Зоны культур тоже делаем квадратными
          if(dx <= 25 && dy <= 25) gState[i] = H;
          else if(dx <= 40 && dy <= 40) gState[i] = C;
          else gState[i] = S;
        }
      }
      renderCellToMap(x, y, 0);
    }
  }
}

function blocked(gx, gy) {
  if (gx<0||gx>=MW||gy<0||gy>=MH) return true;
  return gState[gy*MW+gx]===F;
}

let joyActive = false;

const MAX_RADIUS = 50;

const jZone = document.getElementById('joystick-zone');
const jBase = document.getElementById('joystick-base');
const jKnob = document.getElementById('joystick-knob');

jZone.addEventListener('touchstart', (e) => {
  if (joyActive || shopOpen) return;
  const t = e.changedTouches[0];
  jTouchId = t.identifier;
  joyActive = true;
  jBaseX = t.clientX;
  jBaseY = t.clientY;
  jBase.style.display = 'block';
  jBase.style.left = jBaseX + 'px';
  jBase.style.top = jBaseY + 'px';
  jKnob.style.transform = 'translate(-50%, -50%)';
  joyDX = 0; joyDY = 0;
}, {passive: false});

jZone.addEventListener('touchmove', (e) => {
  if (!joyActive) return;
  e.preventDefault();
  for (let i = 0; i < e.changedTouches.length; i++) {
    const t = e.changedTouches[i];
    if (t.identifier === jTouchId) {
      let dx = t.clientX - jBaseX;
      let dy = t.clientY - jBaseY;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist > MAX_RADIUS) {
        dx = (dx / dist) * MAX_RADIUS;
        dy = (dy / dist) * MAX_RADIUS;
      }
      jKnob.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
      joyDX = dx / MAX_RADIUS;
      joyDY = dy / MAX_RADIUS;
    }
  }
}, {passive: false});

function stopJoy(e) {
  for (let i = 0; i < e.changedTouches.length; i++) {
    if (e.changedTouches[i].identifier === jTouchId) {
      joyActive = false;
      jTouchId = null;
      joyDX = 0; joyDY = 0;

}

// ── ХЭШ ─────────────────────────────────────────────────────
function h(a,b,s){
  let v=(a*73856093)^(b*19349663)^(s*83492791);
  v=Math.imul(v^(v>>>16),0x45d9f3b);
  v=Math.imul(v^(v>>>16),0x45d9f3b);
  return((v^(v>>>16))&0x7FFFFFFF)/0x7FFFFFFF;
}

// ── РИСОВАНИЕ ────────────────────────────────────────────────
function renderCellToMap(gx,gy,now){
  if (!mapCx) return;
  if(gx<0||gx>=MW||gy<0||gy>=MH)return;
  const i=gy*MW+gx;
  const st=gState[i];
  const sx=gx*T;
  const sy=gy*T;
  
  if(st===F){
    // Forest
    if (window.customTextures && window.customTextures.forest) {
      mapCx.drawImage(window.customTextures.forest, sx, sy, T, T);
    } else {
      const r=h(gx,gy,1);
      mapCx.fillStyle=`hsl(${110+r*20}, ${40+r*20}%, ${25+r*10}%)`;
      mapCx.fillRect(sx,sy,T,T);
    }
    
    // Рисуем забор на стыке с плантацией
    const landLvl = Number(upgLvl.land) || 0;
    const halfSize = 25 + landLvl * 15;
    const cx_val = MW / 2;
    const cy_val = MH / 2;
    const dx = Math.abs(gx - cx_val);
    const dy = Math.abs(gy - cy_val);
    
    // Если эта клетка леса граничит с плантацией
    const isBorderX = (dx === halfSize + 1 && dy <= halfSize + 1);
    const isBorderY = (dy === halfSize + 1 && dx <= halfSize + 1);
    
    if (isBorderX || isBorderY) {
      // Рисуем деревянный забор
      mapCx.strokeStyle = '#8B5A2B'; // Темно-коричневый
      mapCx.lineWidth = 3;
      
      // Горизонтальные перекладины
      mapCx.strokeRect(sx, sy + T/3, T, 3);
      mapCx.strokeRect(sx, sy + 2*T/3, T, 3);
      
      // Вертикальные столбики
      mapCx.fillStyle = '#A0522D';
      mapCx.fillRect(sx + 3, sy, 4, T);
      mapCx.fillRect(sx + T/2 - 2, sy, 4, T);
      mapCx.fillRect(sx + T - 7, sy, 4, T);
    }
    return;
  }
  
  const h1=h(gx,gy,1);
  const h2=h(gx,gy,2);
  const h3=h(gx,gy,3);
  
  const isHay = (st===H || st===G);
  const isCorn = (st===C || st===CG);
  const isSun = (st===S || st===SG);
  
  const p = (st===H || st===C || st===S) ? 1 : Math.min(1, (now - gCutAt[i])/GROW_DUR);
  
  // Коричневая грязь под культурами
  const dirtColor = `hsl(35, 50%, ${20 + h1 * 10}%)`;
  
  if (window.customTextures && window.customTextures.dirt) {
    mapCx.drawImage(window.customTextures.dirt, sx, sy, T, T);
  } else {
    // Base ground
    if (isHay) {
      if(p<.33) mapCx.fillStyle = dirtColor;
      else mapCx.fillStyle = `hsl(${44+h1*12}, 80%, ${57+h2*12}%)`; // Желтое сено
    } else if (isCorn) {
      if(p<.33) mapCx.fillStyle = dirtColor;
      else mapCx.fillStyle = `hsl(${65+h1*10}, 75%, ${50+h2*10}%)`; // Салатовая кукуруза
    } else if (isSun) {
      if(p<.33) mapCx.fillStyle = dirtColor;
      else mapCx.fillStyle = `hsl(${35+h1*10}, 70%, ${45+h2*10}%)`; // Оранжевый подсолнух
    }
    mapCx.fillRect(sx,sy,T,T);
  }
  
  let customCrop = null;
  if (isHay && window.customTextures && window.customTextures.hay) customCrop = window.customTextures.hay;
  if (isCorn && window.customTextures && window.customTextures.corn) customCrop = window.customTextures.corn;
  if (isSun && window.customTextures && window.customTextures.sun) customCrop = window.customTextures.sun;

  if (p >= .33 && customCrop) {
    mapCx.drawImage(customCrop, sx, sy, T, T);
    return;
  }
  
  const cnt=7+(h3*4)|0;
  for(let j=0; j<cnt; j++){
    const hx =h(gx*7+j,gy*3+j,10+j);
    const hh2=h(gx*3+j,gy*9+j,20+j);
    const hc =h(gx*5+j,gy*2+j,30+j);
    const stx=sx+3+hx*(T-6);
    
    if (isHay) {
      const maxH=T*(.22+hh2*.45);
      const hp=p<.33?(p/.33)*.33:p<.66?.33+(p-.33)/.34*.34:.67+(p-.66)/.34*.33;
      const sth=maxH*Math.min(1,hp);
      const colorT=Math.max(0,(p-.33)/.67);
      const hue=110-colorT*66;
      const light=32+colorT*30;
      const alpha=.38+hc*.42;
      mapCx.fillStyle=`hsla(${hue},75%,${light}%,${alpha})`;
      mapCx.fillRect(stx,sy+T-3-sth,1,sth);
      if(p>.35){
        const tA=Math.min(1,(p-.35)/.3)*alpha;
        mapCx.fillStyle=`hsla(${hue-8},78%,${light-5}%,${tA})`;
        mapCx.fillRect(stx-1,sy+T-3-sth-3,3,4);
      }
    } else if (isCorn) {
      const maxH=T*(.5+hh2*.5);
      const sth=maxH*p;
      mapCx.fillStyle=`hsl(${90+hc*20}, 70%, ${35+hc*15}%)`;
      mapCx.fillRect(stx-1,sy+T-2-sth,2,sth);
      if(p>0.8) {
        // Corn cob
        mapCx.fillStyle=`hsl(50, 90%, 60%)`;
        mapCx.fillRect(stx-1,sy+T-2-sth*.7,3,sth*.3);
      }
    } else if (isSun) {
      const maxH=T*(.4+hh2*.3);
      const sth=maxH*p;
      mapCx.fillStyle=`hsl(${100+hc*10}, 60%, 30%)`;
      mapCx.fillRect(stx,sy+T-2-sth,2,sth);
      if(p>0.9) {
        // Sunflower head
        mapCx.fillStyle=`hsl(50, 100%, 55%)`;
        mapCx.beginPath(); mapCx.arc(stx+1, sy+T-2-sth, 4, 0, Math.PI*2); mapCx.fill();
        mapCx.fillStyle=`hsl(30, 80%, 20%)`;
        mapCx.beginPath(); mapCx.arc(stx+1, sy+T-2-sth, 2, 0, Math.PI*2); mapCx.fill();
      }
    }
  }
}

function drawGrowingMap(sx,sy,p,h1,h2,h3,gx,gy){
  mapCx.fillStyle=`hsl(30,50%,${23+h1*8}%)`;
  mapCx.fillRect(sx,sy,T,T);
  for(let i=0;i<3;i++){
    const px2=h(gx*3+i,gy*5+i,60+i);
    const py2=h(gx*7+i,gy*2+i,70+i);
    const pr =h(gx+i,  gy+i,  80+i);
    mapCx.fillStyle=`rgba(0,0,0,${.07+pr*.07})`;
    mapCx.fillRect(sx+2+px2*(T-7),sy+2+py2*(T-7),3+pr*5,2+pr*4);
  }
  if(p>0.03) drawStalksMap(sx,sy,p,h1,h2,h3,gx,gy);
  mapCx.fillStyle='rgba(0,0,0,.05)';mapCx.fillRect(sx,sy,T,1);mapCx.fillRect(sx,sy,1,T);
}

function drawStalksMap(sx,sy,p,h1,h2,h3,gx,gy){
  if(p>=0.99){
    mapCx.fillStyle=`hsl(${44+h1*12},80%,${57+h2*12}%)`;
    mapCx.fillRect(sx,sy,T,T);
  }
  const cnt=4+(h3*4)|0;
  for(let i=0;i<cnt;i++){
    const hx =h(gx*7+i,gy*3+i,10+i);
    const hh2=h(gx*3+i,gy*9+i,20+i);
    const hc =h(gx*5+i,gy*2+i,30+i);
    const stx=sx+3+hx*(T-6);
    const maxH=T*(.22+hh2*.45);
    const hp=p<.33?(p/.33)*.33:p<.66?.33+(p-.33)/.34*.34:.67+(p-.66)/.34*.33;
    const sth=maxH*Math.min(1,hp);
    const colorT=Math.max(0,(p-.33)/.67);
    const hue=110-colorT*66;
    const light=32+colorT*30;
    const alpha=.38+hc*.42;
    mapCx.fillStyle=`hsla(${hue},75%,${light}%,${alpha})`;
    mapCx.fillRect(stx,sy+T-3-sth,1,sth);
    if(p>.35){
      const tA=Math.min(1,(p-.35)/.3)*alpha;
      mapCx.fillStyle=`hsla(${hue-8},78%,${light-5}%,${tA})`;
      mapCx.fillRect(stx-1,sy+T-3-sth-3,3,4);
    }
  }
  mapCx.fillStyle='rgba(0,0,0,.05)';mapCx.fillRect(sx,sy,T,1);mapCx.fillRect(sx,sy,1,T);
}

function drawPlayer(){
  const PW=getMowW(), PH=getMowH();
  const sx = Math.round(px - camX + CW/2);
  const sy = Math.round(py - camY + CH/2);

  // Константные размеры самого трактора
  const bodyW = 24;
  const bodyH = 35;

  // --- Глобальная тень ---
  cx.save();
  cx.translate(sx + 4, sy + 4); // Смещение тени на экране
  cx.rotate(pAng+Math.PI/2);
  cx.fillStyle='rgba(0,0,0,.28)';
  cx.fillRect(-bodyW/2, -bodyH/2, bodyW, bodyH); // Кузов
  cx.fillRect(-PW/2, -bodyH/2 - 10, PW, 7); // Ковш
  const ww=5,wh=bodyH*.30|0;
  cx.fillRect(-bodyW/2-ww, -bodyH/2+6, ww,wh); // Колеса
  cx.fillRect( bodyW/2,    -bodyH/2+6, ww,wh);
  cx.fillRect(-bodyW/2-ww,  bodyH/2-6-wh, ww,wh);
  cx.fillRect( bodyW/2,     bodyH/2-6-wh, ww,wh);
  cx.restore();

  // --- Сам трактор ---
  cx.save();
  cx.translate(sx,sy);
  cx.rotate(pAng+Math.PI/2);

  // 🚜 Металлический ковш/жатка спереди (ширина PW растягивается при апгрейдах)
  // Крепления ковша к трактору
  cx.fillStyle = '#555555';
  cx.fillRect(-6, -bodyH/2 - 4, 3, 5);
  cx.fillRect(3, -bodyH/2 - 4, 3, 5);

  // Сам ковш (основная балка)
  cx.fillStyle = '#b0b8c0';
  cx.fillRect(-PW/2, -bodyH/2 - 10, PW, 7);

  // Боковые защитные щитки
  cx.fillStyle = '#606870';
  cx.fillRect(-PW/2 - 2, -bodyH/2 - 12, 2, 10);
  cx.fillRect( PW/2,     -bodyH/2 - 12, 2, 10);

  // Желто-черные предупреждающие полосы на ковше
  cx.fillStyle = '#e0a800';
  const stripeStep = 6;
  const stripeW = 2;
  const numStripes = Math.floor(PW / stripeStep);
  const patternW = (numStripes - 1) * stripeStep + stripeW;
  const offsetX = (PW - patternW) / 2;
  for(let i=0; i<numStripes; i++) {
    cx.fillRect(-PW/2 + offsetX + i*stripeStep, -bodyH/2 - 10, stripeW, 7);
  }

  // 🚜 Сам трактор (Красный или градиентный Золотой)
  if (upgLvl.quest >= 3) {
    let grad = cx.createLinearGradient(-bodyW/2, -bodyH/2, bodyW/2, bodyH/2);
    grad.addColorStop(0, '#ffeeaa');
    grad.addColorStop(0.4, '#ffcc00');
    grad.addColorStop(1, '#996600');
    cx.fillStyle = grad;
  } else {
    cx.fillStyle = '#cc2200';
  }
  cx.fillRect(-bodyW/2,-bodyH/2,bodyW,bodyH);

  // Желтый капот (или светлый блик для золотого)
  cx.fillStyle = (upgLvl.quest >= 3) ? 'rgba(255,255,255,0.5)' : '#ffb81c';
  cx.fillRect(-bodyW/2+3,-bodyH/2+3,bodyW-6,bodyH*.42);

  // Синее лобовое стекло
  cx.fillStyle='#87ceeb';
  cx.fillRect(-bodyW/2+6,-bodyH/2+6,bodyW-12,bodyH*.24);

  // Квадратные блестки для золотого трактора
  if (upgLvl.quest >= 3) {
    cx.fillStyle = '#ffffff';
    cx.fillRect(-bodyW/2 + 4, -bodyH/2 + 4, 3, 3);
    cx.fillRect(bodyW/2 - 6, bodyH/2 - 6, 4, 4);
    cx.fillRect(-bodyW/2 + 5, bodyH/2 - 6, 2, 2);
  }

  // Колеса (не растягиваются, крепятся по бокам кузова)
  cx.fillStyle='#111';
  cx.fillRect(-bodyW/2-ww, -bodyH/2+6,     ww,wh);
  cx.fillRect( bodyW/2,    -bodyH/2+6,     ww,wh);
  cx.fillRect(-bodyW/2-ww,  bodyH/2-6-wh,  ww,wh);
  cx.fillRect( bodyW/2,     bodyH/2-6-wh,  ww,wh);

  cx.restore();


  if (showHitboxes) {
    // Хитбокс трактора (круг)
    cx.save();
    cx.strokeStyle = '#ff00ff'; // Яркий пурпурный (неоновый)
    cx.fillStyle = 'rgba(255, 0, 255, 0.2)'; // Полупрозрачная заливка
    cx.lineWidth = 4;
    cx.beginPath();
    cx.arc(sx, sy, window.devTractorRadius, 0, Math.PI * 2);
    cx.fill();
    cx.stroke();
    
    // Линия среза ковша
    const PW = getMowW();
    const cutterDist = 35 / 2 + 6;
    const sDX = -Math.sin(pAng) * (PW / 2);
    const sDY =  Math.cos(pAng) * (PW / 2);
    
    // Центр ковша относительно центра экрана (трактора)
    const cutterCx = sx + Math.cos(pAng) * cutterDist;
    const cutterCy = sy + Math.sin(pAng) * cutterDist;
    
    cx.strokeStyle = '#00ff00'; // Яркий неоновый зелёный
    cx.lineWidth = 5; // Более толстая линия для ковша
    cx.beginPath();
    cx.moveTo(cutterCx + sDX, cutterCy + sDY);
    cx.lineTo(cutterCx - sDX, cutterCy - sDY);
    cx.stroke();
    cx.restore();
  }
}

function drawAITractor(b){

  // Константные размеры самого трактора

  cx.fillRect( bodyW/2,     bodyH/2-6-wh, ww,wh);

  // --- Сам бот ---

  cx.fillRect(-PW/2 - 2, -bodyH/2 - 12, 2, 10);

  // Синий кузов бота
  cx.fillStyle = '#1e88e5';

  cx.fillRect(-1, 0, 2, bodyH/2 - 4);

  // Колеса

  cx.fillRect(-bodyW/2-ww, -bodyH/2+6,     ww,wh);

  cx.fillRect(-bodyW/2-ww,  bodyH/2-wh-6,  ww,wh);

  cx.fillRect( bodyW/2+1,    -bodyH/2+8, ww-2, wh-4);
  cx.fillRect(-bodyW/2-ww+1,  bodyH/2-wh-4, ww-2, wh-4);
  cx.fillRect( bodyW/2+1,     bodyH/2-wh-4, ww-2, wh-4);

// ── РЕНДЕР ───────────────────────────────────────────────────
function render(now){
  cx.clearRect(0,0,CW,CH);
  
  // Рисуем кэшированную карту за один вызов!
  const mapSx = Math.max(0, Math.min(MW * T - CW, camX - CW / 2));
  const mapSy = Math.max(0, Math.min(MH * T - CH, camY - CH / 2));

  try {
    cx.drawImage(mapCv, mapSx, mapSy, CW, CH, 0, 0, CW, CH);
  } catch(e) {}
  
  if (!isNight || nightAlpha < 0.85) {
    // Всплывающий текст поверх карты, но под трактором
    cx.save();
    cx.translate(-mapSx, -mapSy);
    cx.font = 'bold 16px "Segoe UI", sans-serif';
    cx.textAlign = 'center';
    cx.lineWidth = 3;
    for (const ft of floatTexts) {
      cx.globalAlpha = ft.life;
      cx.strokeStyle = 'rgba(0,0,0,' + ft.life + ')';
      cx.fillStyle = 'rgba(255,235,59,' + ft.life + ')'; // #ffeb3b
      cx.strokeText(ft.text, ft.x, ft.y);
      cx.fillText(ft.text, ft.x, ft.y);
    }
    cx.restore();

    drawPlayer();
    let numBots = upgLvl.autopilot || 0; let maxBots = upgLvl.quest >= 2 ? 5 : 3; if (numBots > maxBots) numBots = maxBots; while(bots.length < numBots) bots.push({ x: px + 50 + bots.length*40, y: py + 50, ang: 0, tgtI: -1, cd: 0 });
    for(let i=0; i<numBots; i++) drawAITractor(bots[i]);
  }

  // ── Ночной оверлей ───────────────────────────────────────────
  if (nightAlpha > 0) {
    // Тёмное небо
    cx.fillStyle = `rgba(0,8,30,${nightAlpha})`;
    cx.fillRect(0, 0, CW, CH);

    // Звёзды появляются по мере затемнения
    const starA = Math.max(0, (nightAlpha - 0.55) / 0.45);
    if (starA > 0) {
      cx.fillStyle = `rgba(255,255,255,${starA})`;
      
      // Генерируем звёзды один раз и кэшируем, чтобы они заполняли весь экран
      if (!window.nightStarsCache) {
        window.nightStarsCache = [];
        for (let i = 0; i < 200; i++) {
          window.nightStarsCache.push({
            x: Math.random(), 
            y: Math.random(), 
            s: Math.random() > 0.85 ? 2 : 1 
          });
        }
      }
      
      for (const st of window.nightStarsCache) {
        cx.fillRect(st.x * CW, st.y * CH, st.s, st.s);
      }
      
      // Луна (всегда в правом верхнем углу)
      const moonA = Math.max(0, (nightAlpha - 0.7) / 0.3);
      if (moonA > 0) {
        cx.fillStyle = `rgba(240,240,200,${moonA})`;
        cx.beginPath();
        cx.arc(CW - 120, 70, 28 * moonA, 0, Math.PI * 2);
        cx.fill();
        cx.fillStyle = `rgba(0,8,30,${moonA * 0.85})`;
        cx.beginPath();
        cx.arc(CW - 110, 62, 24 * moonA, 0, Math.PI * 2);
        cx.fill();
      }
    }

    // Текст «Ночь...» на пике темноты
    if (nightPhase === 'darkening' && nightAlpha > 0.8) {
      const ta = (nightAlpha - 0.8) / 0.2;
      cx.fillStyle = `rgba(180,160,255,${ta})`;
      cx.font = `bold ${Math.round(CW * 0.045)}px 'Segoe UI', sans-serif`;
      cx.textAlign = 'center';
      cx.fillText(t('nightText'), CW/2, CH/2 + 60);
      cx.textAlign = 'left';
    }
  }
}

// ── UPDATE ───────────────────────────────────────────────────
function update(dt,now){
  if (nightPhase) return;
  if (isNaN(px) || isNaN(py)) { px = MW/2*T; py = MH/2*T; }
  if (isNaN(pAng)) pAng = 0;
  
  let SPD = getSpeed();
  if (isNaN(SPD) || SPD < 50) SPD = BASE_SPD;

  // Боты-Трактористы
  let numBots = upgLvl.autopilot || 0; let maxBots = upgLvl.quest >= 2 ? 5 : 3; if (numBots > maxBots) numBots = maxBots; while(bots.length < numBots) bots.push({ x: px + 50 + bots.length*40, y: py + 50, ang: 0, tgtI: -1, cd: 0 });
  const bSpdMult = 1 + (upgLvl.botSpeed || 0) * 0.25; // +25% скорости за уровень
  for (let i = 0; i < numBots; i++) {
    let b = bots[i];
    b.cd -= dt;
    if (b.cd <= 0 || b.tgtI === -1 || gState[b.tgtI] !== H) {
      b.cd = 0.5 + Math.random() * 0.5; // Ищем цель раз в 0.5-1.0 сек
      let bestD = Infinity;
      let bestI = -1;
      const bx = Math.floor(b.x / T), by = Math.floor(b.y / T);
      for(let dy = -MH; dy <= MH; dy++) {
        for(let dx = -MW; dx <= MW; dx++) {
          const nx = bx + dx, ny = by + dy;
          if (nx>=0 && nx<MW && ny>=0 && ny<MH) {
            const idx = ny * MW + nx;
            if (gState[idx] === H) {
              const dist = dx*dx + dy*dy;
              if (dist < bestD) { bestD = dist; bestI = idx; }
            }
          }
        }
      }
      b.tgtI = bestI;
    }

    if (b.tgtI !== -1) {
      const tx = (b.tgtI % MW) * T + T/2;
      const ty = Math.floor(b.tgtI / MW) * T + T/2;
      const targetAng = Math.atan2(ty - b.y, tx - b.x);
      let diff = targetAng - b.ang;
      while (diff > Math.PI) diff -= Math.PI*2;
      while (diff < -Math.PI) diff += Math.PI*2;
      b.ang += Math.sign(diff) * Math.min(Math.abs(diff), 3 * dt); // скорость поворота
    } else {
      b.ang += 0.5 * dt; // кружимся на месте
    }

    // Избегание препятствий (заборов)
    const lookX = b.x + Math.cos(b.ang) * 35;
    const lookY = b.y + Math.sin(b.ang) * 35;
    if (col(lookX, lookY)) {
      b.ang += Math.PI * dt;
    }

    if (b.tgtI !== -1) {
      const aiSpeed = BASE_SPD * 0.6 * bSpdMult; 
      const nx = b.x + Math.cos(b.ang) * aiSpeed * dt;
      const ny = b.y + Math.sin(b.ang) * aiSpeed * dt;
      if (!col(nx, b.y)) b.x = nx;
      if (!col(b.x, ny)) b.y = ny;
      mowAt(b.x, b.y, b.ang, now, true);
    }
  }

  // Обновление всплывающего текста
  for (let i = floatTexts.length - 1; i >= 0; i--) {
    const ft = floatTexts[i];
    ft.y -= 30 * dt;
    ft.life -= dt * 1.5;
    if (ft.life <= 0) floatTexts.splice(i, 1);
  }

  let kDX=0,kDY=0;
  if(K['KeyW'] || K['ArrowUp'] || K['w'] || K['ц'])kDY-=1;
  if(K['KeyS'] || K['ArrowDown'] || K['s'] || K['ы'])kDY+=1;
  if(K['KeyA'] || K['ArrowLeft'] || K['a'] || K['ф'])kDX-=1;
  if(K['KeyD'] || K['ArrowRight'] || K['d'] || K['в'])kDX+=1;
  if(kDX&&kDY){kDX*=.7071;kDY*=.7071}
  
  let dx = kDX, dy = kDY;
  
  if (kDX === 0 && kDY === 0 && joyActive) {
    dx = joyDX;
    dy = joyDY;
  }
  
  let targetAngle = pAng;
  let isMoving = false;
  
  if (dx || dy) {
    // Избегаем тряски джойстика
    if (!joyActive || Math.hypot(dx, dy) > 0.15) {
      targetAngle = Math.atan2(dy, dx);
      isMoving = true;
    }
  }
  
  let playedCutThisFrame = false;

  // Плавный поворот и движение по дуге ("как машина")
  if (isMoving) {
    let diff = targetAngle - pAng;
    // Нормализуем разницу углов от -PI до PI
    while (diff > Math.PI) diff -= Math.PI * 2;
    while (diff < -Math.PI) diff += Math.PI * 2;
    
    const turnSpeed = 5.0; // Скорость поворота руля
    if (Math.abs(diff) < turnSpeed * dt) {
      pAng = targetAngle;
    } else {
      pAng += Math.sign(diff) * turnSpeed * dt;
    }
    
    // Движемся ВПЕРЕД туда, куда смотрит трактор (автомобильная физика)
    const forwardX = Math.cos(pAng);
    const forwardY = Math.sin(pAng);
    
    // ТРАТА ВЫНОСЛИВОСТИ (теперь тратится в 1.5 раза быстрее)
    if (isNaN(currentStamina)) currentStamina = maxStamina;
    currentStamina -= dt * 1.5;
    if (currentStamina < 0) currentStamina = 0;
    
    let pct = currentStamina / maxStamina;
    if (isNaN(pct)) pct = 1;
    const stFill = document.getElementById('stamina-fill');
    stFill.style.width = (pct * 100) + '%';
    document.getElementById('stamina-text').textContent = Math.ceil(pct * 100) + '%';
    
    let spdMult = 1.0;
    if (pct <= 0.15) {
      stFill.style.backgroundColor = '#ff3333';
      document.getElementById('stamina-wrap').classList.add('flashing');
      spdMult = Math.max(0.1, pct / 0.15); // от 1.0 до 0.1 (10% скорости)
    } else {
      stFill.style.backgroundColor = '#33ff33';
      document.getElementById('stamina-wrap').classList.remove('flashing');
    }
    
    // Общий вектор движения за этот кадр
    const moveX = forwardX * (SPD * spdMult) * dt;
    const moveY = forwardY * (SPD * spdMult) * dt;
    
    // ── МИКРО-ШАГИ (чтобы не пропускать траву на поворотах и высокой скорости) ──
    const moveDist = Math.hypot(moveX, moveY);
    const stepDist = 8; // Идеальная точность: проверяем ковш каждые 8 пикселей!
    const steps = Math.max(1, Math.ceil(moveDist / stepDist));
    
    const stepX = moveX / steps;
    const stepY = moveY / steps;
    
    for (let s = 0; s < steps; s++) {
      // Шаг трактора
      const nx = px + stepX; if (!col(nx, py)) px = nx;
      const ny = py + stepY; if (!col(px, ny)) py = ny;
      
      // Сразу косим траву в новой промежуточной точке
      if (mowAt(px, py, pAng, now, false)) {
        playedCutThisFrame = true;
      }
    }
  }

  if (playedCutThisFrame) {
    playCut();
    // Обновляем текст счёта один раз за кадр, а не при каждой скошенной травинке (убирает лаги)
    scEl.textContent = score;
    if (shopOpen) document.getElementById('bal').textContent = score;
  }

  camX+=(px-camX)*LRP; camY+=(py-camY)*LRP;
  
  // Идеальное ограничение камеры: не даём ей выйти за пределы карты,
  // чтобы не было черной "пустоты" по краям экрана.
  const halfW = MW * T / 2;
  const halfH = MH * T / 2;
  camX = Math.max(Math.min(CW/2, halfW), Math.min(Math.max(MW*T - CW/2, halfW), camX));
  camY = Math.max(Math.min(CH/2, halfH), Math.min(Math.max(MH*T - CH/2, halfH), camY));
}

// Быстрая функция дистанции (в квадрате), чтобы не вызывать медленный Math.sqrt тысячи раз
function distToSegSq(cx, cy, x1, y1, x2, y2) {
  const dx = x2 - x1, dy = y2 - y1;
  const l2 = dx * dx + dy * dy;
  if (l2 === 0) return (cx - x1)**2 + (cy - y1)**2;
  let t = ((cx - x1) * dx + (cy - y1) * dy) / l2;
  t = Math.max(0, Math.min(1, t));
  return (cx - (x1 + t * dx))**2 + (cy - (y1 + t * dy))**2;
}

// ── ФУНКЦИЯ ПОКОСА ───────────────────────────────────────────
function mowAt(tx, ty, tAng, now, isAI = false) {
  let didCut = false;
  const PW = isAI ? BASE_PW : getMowW(); // У ИИ базовая косилка
  const cutterDist = 35 / 2 + 6;
  const cutterX = tx + Math.cos(tAng) * cutterDist;
  const cutterY = ty + Math.sin(tAng) * cutterDist;

  const sDX = -Math.sin(tAng) * (PW / 2);
  const sDY =  Math.cos(tAng) * (PW / 2);
  const x1 = cutterX + sDX, y1 = cutterY + sDY;
  const x2 = cutterX - sDX, y2 = cutterY - sDY;

  const rX = Math.ceil(PW / 2) + T * 2;
  const rY = Math.ceil(PW / 2) + T * 2;
  const gx0 = Math.max(0,    Math.floor((cutterX - rX) / T));
  const gx1 = Math.min(MW-1, Math.floor((cutterX + rX) / T));
  const gy0 = Math.max(0,    Math.floor((cutterY - rY) / T));
  const gy1 = Math.min(MH-1, Math.floor((cutterY + rY) / T));

  const candidates = [];
  const distSqLimit = 38 * 38; // Увеличенный порог (без извлечения корня)

  for (let gy = gy0; gy <= gy1; gy++) {
    for (let gx = gx0; gx <= gx1; gx++) {
      const cellI = gy * MW + gx;
      if (gState[cellI] === H || gState[cellI] === C || gState[cellI] === S) {
        const cxVal = gx * T + T / 2;
        const cyVal = gy * T + T / 2;
        const d2 = distToSegSq(cxVal, cyVal, x1, y1, x2, y2);
        if (d2 < distSqLimit) {
          candidates.push({ i: cellI, d2: d2 });
        }
      }
    }
  }

  // Ограничиваем сбор N ближайшими блоками (чтобы не лагало)
  const maxCollect = 1 + upgLvl.width; 
  if (candidates.length > maxCollect) {
    candidates.sort((a, b) => a.d2 - b.d2);
  }
  
  const len = Math.min(candidates.length, maxCollect);
  for (let k = 0; k < len; k++) {
    didCut = true;
    const i = candidates[k].i;
    const st = gState[i];
    if(st===H) gState[i] = G;
    else if(st===C) gState[i] = CG;
    else if(st===S) gState[i] = SG;
    
    gCutAt[i] = now;
    growSet.add(i);
    
    let baseAmount = 1;
    if(st===C) baseAmount = 5;
    if(st===S) baseAmount = 25;
    const amount = baseAmount + getScoreBonus();
    score += amount;
    
    floatTexts.push({
      x: (i % MW) * T + T / 2 + (Math.random() * 10 - 5),
      y: Math.floor(i / MW) * T + T / 2 + (Math.random() * 10 - 5),
      text: "+" + amount,
      life: isAI ? 0.4 : 1.0
    });

    // DOM 업데이트 УБРАН отсюда, перерисовка только одного блока
    renderCellToMap(i % MW, Math.floor(i / MW), now);
  }

  if (didCut && isAI) {
    scEl.textContent = score;
    if (shopOpen) { const be = document.getElementById('bal'); if(be) be.textContent = score; }
  }

  return didCut;
}

function col(x,y){
  const r = window.devTractorRadius;
  const x0=(x-r)/T|0,x1=(x+r)/T|0;
  const y0=(y-r)/T|0,y1=(y+r)/T|0;
  for(let gy=y0;gy<=y1;gy++)
    for(let gx=x0;gx<=x1;gx++)
      if(blocked(gx,gy))return true;
  return false;
}

// ── НОЧЬ И РАССВЕТ ───────────────────────────────────────────
function startNight() {
  if (isNight) return;
  isNight = true;
  nightPhase = 'darkening';
  nightStartTime = performance.now();
  document.getElementById('rest-btn').disabled = true;
  animateNight();
}

let staminaAtNightStart = 0;

function animateNight() {
  const now = performance.now();
  const elapsed = now - nightStartTime;
  const FADE_DUR = 2500; // 2.5 секунды темнеет/светлеет
  const MIDNIGHT_DUR = 2000; // 2 секунды абсолютной ночи

  if (nightPhase === 'darkening') {
    nightAlpha = Math.min(0.93, elapsed / FADE_DUR);
    if (elapsed >= FADE_DUR) {
      nightAlpha = 0.93;
      nightPhase = 'midnight';
      nightStartTime = now;
      
      staminaAtNightStart = currentStamina;
      document.getElementById('stamina-wrap').classList.remove('flashing');
    }
  } else if (nightPhase === 'midnight') {
    // Плавная анимация восстановления выносливости пока спим
    const progress = Math.min(1, elapsed / MIDNIGHT_DUR);
    currentStamina = staminaAtNightStart + (maxStamina - staminaAtNightStart) * progress;
    const pct = currentStamina / maxStamina;
    const stFill = document.getElementById('stamina-fill');
    stFill.style.width = (pct * 100) + '%';
    stFill.style.backgroundColor = '#33ff33';
    document.getElementById('stamina-text').textContent = Math.ceil(pct * 100) + '%';

    // В полночь всё замерло, просто ждём рассвета
    if (elapsed >= MIDNIGHT_DUR) {
      // ── РАССВЕТ: всё поле вырастает заново ───────────────────
      currentDay++;
      growSet.clear();
      for (let i = 0; i < gState.length; i++) {
        if (gState[i] === G) {
          gState[i] = H; gCutAt[i] = 0; renderCellToMap(i % MW, Math.floor(i / MW), 0);
        } else if (gState[i] === CG) {
          gState[i] = C; gCutAt[i] = 0; renderCellToMap(i % MW, Math.floor(i / MW), 0);
        } else if (gState[i] === SG) {
          gState[i] = S; gCutAt[i] = 0; renderCellToMap(i % MW, Math.floor(i / MW), 0);
        }
      }
      // Показываем номер дня
      const dayEl = document.getElementById('day-label');
      dayEl.textContent = `${t('dayText')} ${currentDay}`;
      dayEl.classList.add('visible');
      // Сохраняем прогресс
      if (typeof saveProgress === 'function') saveProgress(score, upgLvl, currentDay);
      
      nightPhase = 'brightening';
      nightStartTime = now;
    }
  } else if (nightPhase === 'brightening') {
    nightAlpha = 0.93 * (1 - Math.min(1, elapsed / FADE_DUR));
    if (elapsed >= FADE_DUR) {
      nightAlpha = 0;
      isNight = false;
      nightPhase = '';
      document.getElementById('rest-btn').disabled = false;
      // Скрываем надпись через 2 сек после полного рассвета
      setTimeout(() => {
        document.getElementById('day-label').classList.remove('visible');
      }, 2000);
    }
  }

  if (nightPhase) requestAnimationFrame(animateNight);
}

// ── НОВАЯ ИГРА ────────────────────────────────────────────────
function newGame() {
  const msg = i18n[currentLang].newGameConfirm;
  if (!confirm(msg)) return;
  score = 0;
  currentDay = 1;
  Object.keys(upgLvl).forEach(k => upgLvl[k] = 0);
  updateMaxStamina();
  currentStamina = maxStamina;
  
  scEl.textContent = 0;
  px = MW/2*T; py = MH/2*T; pAng = 0;
  for (let i = 0; i < 3; i++) {
    bots[i] = { x: px + 50 + i*40, y: py + 50, ang: 0, tgtI: -1, cd: 0 };
  }
  camX = px; camY = py;
  growSet.clear();
  initGrid();
  if (shopOpen) renderShop();
  if (typeof saveProgress === 'function') saveProgress(0, {speed:0,width:0,grow:0,bonus:0}, 1);
}

// ── GAME LOOP ────────────────────────────────────────────────
let lastT=0;
function loop(now){
  let dt=Math.min((now-lastT)/1000,.05);
  if (dt < 0 || isNaN(dt)) dt = 0.016;
  lastT=now;
  update(dt,now);
  render(now);
  requestAnimationFrame(loop);
}

// ── МИНИ-КАРТА ───────────────────────────────────────────────
let mapOpen = false;
const mmCanvas = document.getElementById('minimap');
const mmCtx    = mmCanvas.getContext('2d');
const MM = 2; // px на тайл (200px / 100 тайлов)

function toggleMap() {
  playClick();
  mapOpen = !mapOpen;
  document.getElementById('minimap-wrap').classList.toggle('open', mapOpen);
  if (mapOpen) drawMinimap();
}

function drawMinimap() {
  if (!mapOpen) return;
  const img = mmCtx.createImageData(MW * MM, MH * MM);
  const d = img.data;

  for (let gy = 0; gy < MH; gy++) {
    for (let gx = 0; gx < MW; gx++) {
      const st = gState[gy * MW + gx];
      let r, g2, b;
      if (st === F) { 
        const landLvl = Number(upgLvl.land) || 0;
        const halfSize = 25 + landLvl * 15;
        const cx_val = MW / 2;
        const cy_val = MH / 2;
        const dx = Math.abs(gx - cx_val);
        const dy = Math.abs(gy - cy_val);
        const isBorderX = (dx === halfSize + 1 && dy <= halfSize + 1);
        const isBorderY = (dy === halfSize + 1 && dx <= halfSize + 1);
        
        if (isBorderX || isBorderY) {
          r=200; g2=20; b=20; // Красный забор на мини-карте
        } else {
          r=60; g2=110; b=40; // трава леса
        }
      }
      else if (st === H || st === C || st === S) { r=220; g2=175; b=20; }   // выросло — золотой/салатовый
      else               { r=100; g2=75;  b=35; }   // растёт — коричневый

      for (let dy = 0; dy < MM; dy++)
        for (let dx = 0; dx < MM; dx++) {
          const pi = ((gy*MM+dy)*MW*MM + (gx*MM+dx)) * 4;
          d[pi]=r; d[pi+1]=g2; d[pi+2]=b; d[pi+3]=255;
        }
    }
  }

  const pxPx = Math.floor(px / T) * MM + 1;
  const pyPx = Math.floor(py / T) * MM + 1;
  
  if (pxPx >= 0 && pxPx < MW*MM && pyPx >= 0 && pyPx < MH*MM) {
    for (let dy=-1; dy<=1; dy++) {
      for (let dx=-1; dx<=1; dx++) {
        const pi = ((pyPx+dy)*MW*MM + (pxPx+dx)) * 4;
        if (pi >= 0 && pi < d.length) {
          d[pi]=255; d[pi+1]=0; d[pi+2]=0;
        }
      }
    }
  }
  
  let numBots = upgLvl.autopilot || 0; let maxBots = upgLvl.quest >= 2 ? 5 : 3; if (numBots > maxBots) numBots = maxBots; while(bots.length < numBots) bots.push({ x: px + 50 + bots.length*40, y: py + 50, ang: 0, tgtI: -1, cd: 0 });
  for (let i = 0; i < numBots; i++) {
    const b = bots[i];
    const apxPx = Math.floor(b.x / T) * MM + 1;
    const apyPx = Math.floor(b.y / T) * MM + 1;
    if (apxPx >= 0 && apxPx < MW*MM && apyPx >= 0 && apyPx < MH*MM) {
      for (let dy=-1; dy<=1; dy++) {
        for (let dx=-1; dx<=1; dx++) {
          const api = ((apyPx+dy)*MW*MM + (apxPx+dx)) * 4;
          if (api >= 0 && api < d.length) {
            d[api]=50; d[api+1]=100; d[api+2]=255; d[api+3]=255;
          }
        }
      }
    }
  }

  mmCtx.putImageData(img, 0, 0);
}

// Обновляем мини-карту каждые 200мс (не каждый кадр — экономим ресурсы)
setInterval(() => { if (mapOpen) drawMinimap(); }, 200);

if (typeof initYandexGame === 'function') {
  initYandexGame((cloudData, lang) => {
    updateLanguage(lang);
    if (cloudData && typeof cloudData.score !== 'undefined') {
      score = cloudData.score;
      if (cloudData.upgLvl) {
        Object.assign(upgLvl, cloudData.upgLvl);
        if (upgLvl.autopilot > 3) upgLvl.autopilot = 3;
        // Миграция старого сохранения Удобрений в Выносливость
        if (typeof cloudData.upgLvl.grow !== 'undefined') {
          upgLvl.stamina = cloudData.upgLvl.grow;
          delete cloudData.upgLvl.grow;
        }
      }
      if (cloudData.currentDay) currentDay = cloudData.currentDay;
      updateMaxStamina();
      currentStamina = maxStamina;
      scEl.textContent = score;
    }
    
    // Autosave every 30 seconds
    setInterval(() => {
      if (typeof saveProgress === 'function') saveProgress(score, upgLvl, currentDay);
    }, 30000);
    
    loadCustomTextures();
    initGrid();
    lastT=performance.now();
    requestAnimationFrame(loop);
  });
} else {
  loadCustomTextures();
  initGrid();
  lastT=performance.now();
  requestAnimationFrame(loop);
}

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js')
    .then(() => console.log("Service Worker Registered"))
    .catch(err => console.error("SW Registration failed", err));
}

document.getElementById('tex-upload').addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const type = document.getElementById('tex-type').value;
  const reader = new FileReader();
  reader.onload = (ev) => {
    const dataUrl = ev.target.result;
    
    // Save to localStorage
    let saved = {};
    try { saved = JSON.parse(localStorage.getItem('tractorCustomTextures') || '{}'); } catch(e){}
    saved[type] = dataUrl;
    localStorage.setItem('tractorCustomTextures', JSON.stringify(saved));
    
    const img = new Image();
    img.src = dataUrl;
    img.onload = () => {
      const maxS = type === 'tractor' ? 32 : 64;
      const cv = document.createElement('canvas');
      cv.width = maxS; cv.height = maxS;
      cv.getContext('2d').drawImage(img, 0, 0, maxS, maxS);
      window.customTextures[type] = cv;
      
      if(type==='tractor') {
        // Just redraw
      } else {
        if(typeof mapCx !== 'undefined' && mapCx) {
          for(let i=0;i<MW*MH;i++){
            gCutAt[i] = 0; // Trigger redraw
          }
          initGrid();
        }
      }
      if (typeof toggleDevPanel === 'function') toggleDevPanel(); // Close the panel after uploading
    };
  };
  reader.readAsDataURL(file);
});

</script>
